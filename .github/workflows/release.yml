name: Release

on:
  push:
    branches:
      - main

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Java 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '21'

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Compute release metadata
        id: meta
        shell: bash
        run: |
          tag="release-${GITHUB_RUN_NUMBER}"
          version="${tag}+${GITHUB_SHA::7}"
          echo "tag=${tag}" >> "$GITHUB_OUTPUT"
          echo "version=${version}" >> "$GITHUB_OUTPUT"

      - name: Build jars
        run: ./gradlew build -Pmod_version=${{ steps.meta.outputs.version }}

      - name: Publish release
        env:
          GH_TOKEN: ${{ github.token }}
          TAG: ${{ steps.meta.outputs.tag }}
        shell: bash
        run: |
          if gh release view "$TAG" >/dev/null 2>&1; then
            gh release upload "$TAG" build/libs/*.jar --clobber
          else
            gh release create "$TAG" build/libs/*.jar --title "$TAG" --generate-notes
          fi
